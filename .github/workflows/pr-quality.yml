name: PR Quality

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - ready_for_review

jobs:
  validate-pr-body:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR template sections
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const requiredSections = [
              "## Summary",
              "## Delivery Scope",
              "## Risk Review",
              "## Test Plan",
              "## Deployment Notes"
            ];

            const missing = requiredSections.filter((section) => !body.includes(section));

            if (missing.length > 0) {
              core.setFailed(`Missing required PR sections: ${missing.join(", ")}`);
            }
