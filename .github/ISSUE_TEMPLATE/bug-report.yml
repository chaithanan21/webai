name: Bug report
description: Report a defect with clear reproduction details, impact, and validation scope
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one short paragraph.
      placeholder: Login fails after refresh when the access token expires.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Business or user impact
      description: Explain who is affected and how serious the issue is.
      placeholder: Blocks sign-in for returning users on production.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide a deterministic set of steps.
      placeholder: |
        1. Sign in successfully
        2. Wait for the token to expire
        3. Refresh the page
        4. Observe the error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The app should refresh the token and keep the session alive.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The app redirects the user to a blank error page.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, branch, or deployment environment.
      placeholder: Chrome 136 on Windows 10, production
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, stack traces, screenshots, or request/response samples.
      placeholder: Paste evidence that helps QA and developers reproduce faster.
